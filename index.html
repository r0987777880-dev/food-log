<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>飲食紀錄本</title>

<style>

:root{
--green:#7ac142;
--bg:#f5f5f5;
--card:#ffffff;
--text:#222;
}

.dark{
--bg:#121212;
--card:#1f1f1f;
--text:#ffffff;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.icon-btn{
border:none;
background:var(--card);
padding:10px 15px;
border-radius:12px;
cursor:pointer;
font-size:18px;
}

.card{
background:var(--card);
padding:15px;
border-radius:16px;
margin-bottom:15px;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.month-title{
font-size:32px;
font-weight:300;
}

.weekdays,
.days{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
}

.weekdays div{
padding:10px 0;
font-weight:600;
}

.day{
padding:15px 0;
cursor:pointer;
border-radius:50%;
margin:5px;
}

.day:hover{
background:#ddd;
}

.today{
background:var(--green);
color:white;
font-weight:bold;
}

.selected{
outline:3px solid var(--green);
}

/* 步驟 1：新增樣式 */
.has-record{
position:relative;
}

.has-record::after{
content:'';
position:absolute;
bottom:4px;
left:50%;
transform:translateX(-50%);
width:8px;
height:8px;
background:var(--green);
border-radius:50%;
}

.today.has-record::after{
background:white;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat-card{
background:var(--bg);
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.search-item{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.search-item:hover{
background:rgba(122,193,66,.12);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
box-sizing:border-box;
border-radius:8px;
border:1px solid #ccc;
}

button.save{
width:100%;
padding:12px;
background:var(--green);
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.record{
padding:10px;
border-bottom:1px solid #ddd;
}

.search-box{
margin-bottom:15px;
}

.small{
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h2>🍽 飲食紀錄本</h2>
<button class="icon-btn" onclick="toggleDark()">
🌙
</button>
</div>

<div class="card">

<div class="calendar-header">
<button class="icon-btn" onclick="changeMonth(-1)">◀</button>

<div class="month-title" id="monthTitle"></div>

<button class="icon-btn" onclick="changeMonth(1)">▶</button>
</div>

<div class="weekdays">
<div>一</div>
<div>二</div>
<div>三</div>
<div>四</div>
<div>五</div>
<div>六</div>
<div>日</div>
</div>

<div class="days" id="calendarDays"></div>

</div>

<div class="card">

<h3>📊 本月統計</h3>

<div class="stats">

<div class="stat-card">
<div id="recordDays">0</div>
<div>有紀錄天數</div>
</div>

<div class="stat-card">
<div id="recordCount">0</div>
<div>總紀錄數</div>
</div>

</div>

</div>

<div class="card">

<h3>新增紀錄</h3>

<input type="date" id="date">

<select id="meal">
<option>早餐</option>
<option>午餐</option>
<option>晚餐</option>
<option>點心</option>
</select>

<input
type="text"
id="food"
placeholder="今天吃了什麼">

<button class="save"
onclick="addRecord()">
新增紀錄
</button>

</div>

<div class="card">

<h3>🔍 搜尋</h3>

<input
type="text"
id="search"
placeholder="搜尋食物..."
oninput="searchFood()">

<div id="searchResult"></div>

</div>

<div class="card">

<h3 id="selectedDateTitle">
當日紀錄
</h3>

<div id="dayRecords">
請點選日期
</div>

</div>

</div>

<script>

const STORAGE_KEY="foodLog";

let currentDate=new Date();
let selectedDate='';

document.getElementById("date").value=
new Date().toISOString().split("T")[0];

function getRecords(){
return JSON.parse(
localStorage.getItem(STORAGE_KEY)||"[]"
);
}

function saveRecords(data){
localStorage.setItem(
STORAGE_KEY,
JSON.stringify(data)
);
}

function addRecord(){

const date=
document.getElementById("date").value;

const meal=
document.getElementById("meal").value;

const food=
document.getElementById("food").value.trim();

if(!food){
alert("請輸入內容");
return;
}

const data=getRecords();

data.push({
date,
meal,
food
});

saveRecords(data);

document.getElementById("food").value="";

// 步驟 8：新增紀錄後自動刷新月曆
showDateRecords(date);

renderCalendar();

alert("新增成功");
}

function renderCalendar(){

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

document.getElementById("monthTitle")
.innerText=
`${year}年 ${month+1}月`;

const first=
new Date(year,month,1);

let start=
(first.getDay()+6)%7;

const daysInMonth=
new Date(year,month+1,0).getDate();

const container=
document.getElementById("calendarDays");

container.innerHTML='';

for(let i=0;i<start;i++){

const empty=document.createElement("div");
container.appendChild(empty);

}

for(let d=1;d<=daysInMonth;d++){

const div=document.createElement("div");

div.className="day";

const dateStr=
`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

// 步驟 4：月曆顯示綠點
const records=getRecords();

const hasRecord=
records.some(
r=>r.date===dateStr
);

if(hasRecord){
div.classList.add(
"has-record"
);
}

// 如果此日期是被選中的日期，加上外框
if(dateStr === selectedDate){
div.classList.add('selected');
}

const today=
new Date();

const todayStr=
today.toISOString().split('T')[0];

if(dateStr===todayStr){
div.classList.add("today");
}

div.innerText=d;

div.onclick=()=>{

selectedDate=dateStr;

showDateRecords(dateStr);

document
.querySelectorAll('.day')
.forEach(x=>x.classList.remove('selected'));

div.classList.add('selected');

};

container.appendChild(div);

}

// 步驟 5：渲染月曆最後更新統計
updateStats();

}

// 步驟 3：新增月統計函式
function updateStats(){

const records=getRecords();

const year=currentDate.getFullYear();

const month=String(
currentDate.getMonth()+1
).padStart(2,'0');

const monthRecords=
records.filter(r=>
r.date.startsWith(
`${year}-${month}`
)
);

const uniqueDays=
new Set(
monthRecords.map(r=>r.date)
);

document.getElementById(
"recordDays"
).innerText=
uniqueDays.size;

document.getElementById(
"recordCount"
).innerText=
monthRecords.length;

}

function changeMonth(step){

currentDate.setMonth(
currentDate.getMonth()+step
);

renderCalendar();

}

function showDateRecords(date){

document.getElementById(
"selectedDateTitle"
).innerText=date;

const data=getRecords();

const result=data.filter(
r=>r.date===date
);

if(result.length===0){

document.getElementById(
"dayRecords"
).innerHTML="無紀錄";

return;
}

document.getElementById(
"dayRecords"
).innerHTML=result.map(r=>`
<div class="record">
<strong>${r.meal}</strong><br>
${r.food}
</div>
`).join('');

}

function searchFood(){

const keyword=
document.getElementById("search")
.value.trim();

const data=getRecords();

if(!keyword){

document.getElementById(
"searchResult"
).innerHTML='';

return;
}

const result=data.filter(
r=>r.food.includes(keyword)
);

// 步驟 6：搜尋結果點擊跳轉
document.getElementById(
"searchResult"
).innerHTML=result.map(r=>`
<div
class="search-item"
onclick="jumpToDate('${r.date}')">
${r.date}<br>
${r.meal}：${r.food}
</div>
`).join('');

}

// 步驟 7：新增跳轉函式
function jumpToDate(date){

const parts=
date.split('-');

currentDate=
new Date(
parts[0],
parts[1]-1,
1
);

selectedDate = date; // 紀錄被選中的日期

renderCalendar();

showDateRecords(date);

}

function toggleDark(){

document.body.classList.toggle(
"dark"
);

localStorage.setItem(
"theme",
document.body.classList.contains("dark")
?"dark":"light"
);

}

if(
localStorage.getItem("theme")
==="dark"
){
document.body.classList.add("dark");
}

renderCalendar();

</script>

</body>
</html>
